const categoryOrder = ["DKW", "Vis", "Vlees", "Groenten", "Brood", "Diepvries", "Zuivel", "Vleeswaren"];

function formatAmount(n) {
  if (Number.isInteger(n)) return String(n);
  return n.toFixed(2).replace(/\.00$/, "").replace(".", ",");
}

function loadRecipes() {
  const select = document.getElementById("recipeList");
  const recipes = [...new Set(data.map(d => d.recipeKey))].sort((a,b)=>a.localeCompare(b, "nl"));
  recipes.forEach(r => {
    const option = document.createElement("option");
    option.value = r;
    option.textContent = r;
    select.appendChild(option);
  });
}

function generateList() {
  const selected = Array.from(document.getElementById("recipeList").selectedOptions).map(o => o.value);
  const result = {};

  data.forEach(item => {
    if (!selected.includes(item.recipeKey)) return;
    const key = item.category + "||" + item.ingredient + "||" + item.unit;
    if (!result[key]) {
      result[key] = {
        ingredient: item.ingredient,
        category: item.category,
        amount: 0,
        unit: item.unit
      };
    }
    result[key].amount += Number(item.amount || 0);
  });

  const table = document.getElementById("output");
  table.innerHTML = `<tr>
    <th>Ingrediënt</th>
    <th>Categorie</th>
    <th>Totaal</th>
    <th>Eenheid</th>
  </tr>`;

  Object.values(result)
    .sort((a,b) => {
      const aIdx = categoryOrder.indexOf(a.category);
      const bIdx = categoryOrder.indexOf(b.category);
      if (aIdx !== bIdx) return aIdx - bIdx;
      return a.ingredient.localeCompare(b.ingredient, "nl");
    })
    .forEach(item => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${item.ingredient}</td>
        <td>${item.category}</td>
        <td>${formatAmount(item.amount)}</td>
        <td>${item.unit}</td>
      `;
      table.appendChild(row);
    });
}

loadRecipes();
function copyList() {
  let text = "";

  // geselecteerde recepten ophalen
  const selectedOptions = Array.from(document.getElementById("recipeList").selectedOptions);
  
  text += "Recepten:\n";
  selectedOptions.forEach(option => {
    text += "- " + option.text + "\n";
  });

  text += "\nBoodschappen:\n";

  // tabel ophalen
  const rows = document.querySelectorAll("#output tr");

  rows.forEach((row, index) => {
    if (index === 0) return;
    const cols = row.querySelectorAll("td");
    text += `${cols[0].innerText} - ${cols[2].innerText} ${cols[3].innerText}\n`;
  });

  navigator.clipboard.writeText(text);
  alert("Gekopieerd!");
}
